<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>文章 - 个人博客</title>
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>
  <!-- 导航栏 -->
  <header class="header">
    <div class="container">
      <nav class="nav">
        <a href="index.html" class="nav__logo">技术<span>笔记</span></a>
        <ul class="nav__menu" id="nav-menu">
          <li><a href="index.html" class="nav__link">首页</a></li>
          <li><a href="about.html" class="nav__link">关于</a></li>
        </ul>
        <button class="menu-toggle" id="menu-toggle" aria-label="菜单">
          <span></span>
          <span></span>
          <span></span>
        </button>
      </nav>
    </div>
  </header>

  <!-- 文章详情 -->
  <main class="post-page">
    <div class="container post-layout">

      <!-- 桌面端：侧边栏目录 -->
      <aside class="toc-sidebar" id="toc-sidebar">
        <div class="toc-sidebar__header">
          <svg class="toc-sidebar__icon" width="15" height="13" viewBox="0 0 15 13" fill="none" aria-hidden="true">
            <rect x="0" y="0" width="15" height="1.8" rx="0.9" fill="currentColor" opacity="0.9"/>
            <rect x="0" y="5.6" width="10" height="1.8" rx="0.9" fill="currentColor" opacity="0.65"/>
            <rect x="0" y="11.2" width="13" height="1.8" rx="0.9" fill="currentColor" opacity="0.4"/>
          </svg>
          <span>目录</span>
        </div>
        <nav class="toc-sidebar__nav" id="toc-nav-desktop"></nav>
      </aside>

      <!-- 文章正文区域 -->
      <div class="post-layout__main">

        <!-- 移动端：折叠式目录 -->
        <details class="toc-mobile" id="toc-mobile">
          <summary class="toc-mobile__toggle">
            <svg width="15" height="13" viewBox="0 0 15 13" fill="none" aria-hidden="true">
              <rect x="0" y="0" width="15" height="1.8" rx="0.9" fill="currentColor" opacity="0.9"/>
              <rect x="0" y="5.6" width="10" height="1.8" rx="0.9" fill="currentColor" opacity="0.65"/>
              <rect x="0" y="11.2" width="13" height="1.8" rx="0.9" fill="currentColor" opacity="0.4"/>
            </svg>
            <span>目录</span>
          </summary>
          <nav class="toc-mobile__nav" id="toc-nav-mobile"></nav>
        </details>

        <div id="post-detail"></div>
      </div>

    </div>
  </main>

  <!-- 页脚 -->
  <footer class="footer">
    <div class="container">
      <div class="footer__content">
        <p class="footer__copyright">&copy; 2026 技术笔记. All rights reserved.</p>
        <div class="footer__social">
          <a href="#" title="GitHub">GH</a>
          <a href="#" title="Twitter">TW</a>
          <a href="#" title="Email">@</a>
        </div>
      </div>
    </div>
  </footer>

  <script src="js/main.js"></script>
</body>
</html>
